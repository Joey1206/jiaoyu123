<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI心理测评系统</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h1,h2,h3 {
      text-align: center;
    }

    .question {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }

    .option-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
      background: #4a90e2;
      color: white;
      font-size: 15px;
    }

    .option-btn:hover {
      opacity: 0.9;
    }

    .selected {
      background: #28a745 !important;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .main-btn {
      padding: 12px 30px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    .main-btn:hover {
      opacity: 0.9;
    }

    #exam,
    #loading,
    #result {
      display: none;
    }

    #loading {
      text-align: center;
      font-size: 18px;
      margin-top: 30px;
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.8;
      background: #fafafa;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>AI心理测评系统</h1>

  <!-- 登录 -->
  <div id="login">

    <label>请输入姓名：</label>

    <input type="text" id="name" placeholder="请输入姓名">

    <div style="text-align:center;">
      <button class="main-btn" onclick="startExam()">
        开始测评
      </button>
    </div>

  </div>

  <!-- 测评 -->
  <div id="exam">

    <h2>请根据真实情况作答</h2>

    <!-- 题目1 -->
    <div class="question">

      <p>1. 你最近是否容易焦虑？</p>

      <button class="option-btn"
        onclick="selectAnswer('anxiety',1,this)">
        是
      </button>

      <button class="option-btn"
        onclick="selectAnswer('anxiety',0,this)">
        否
      </button>

    </div>

    <!-- 题目2 -->
    <div class="question">

      <p>2. 你最近是否感觉压力较大？</p>

      <button class="option-btn"
        onclick="selectAnswer('stress',1,this)">
        是
      </button>

      <button class="option-btn"
        onclick="selectAnswer('stress',0,this)">
        否
      </button>

    </div>

    <!-- 题目3 -->
    <div class="question">

      <p>3. 你最近是否睡眠质量不好？</p>

      <button class="option-btn"
        onclick="selectAnswer('sleep',1,this)">
        是
      </button>

      <button class="option-btn"
        onclick="selectAnswer('sleep',0,this)">
        否
      </button>

    </div>

    <!-- 题目4 -->
    <div class="question">

      <p>4. 你最近是否情绪波动明显？</p>

      <button class="option-btn"
        onclick="selectAnswer('emotion',1,this)">
        是
      </button>

      <button class="option-btn"
        onclick="selectAnswer('emotion',0,this)">
        否
      </button>

    </div>

    <div style="text-align:center;">
      <button class="main-btn" onclick="submitExam()">
        提交测评
      </button>
    </div>

  </div>

  <!-- 加载 -->
  <div id="loading">
    AI正在生成测评报告，请稍候...
  </div>

  <!-- 结果 -->
  <div id="result">

    <h2>测评完成</h2>

    <canvas id="radarChart"></canvas>

    <h3>AI分析报告</h3>

    <pre id="report"></pre>

  </div>

</div>

<script>

  // ======================
  // 分数对象
  // ======================

  let scores = {
    anxiety: null,
    stress: null,
    sleep: null,
    emotion: null
  };

  // ======================
  // 开始测评
  // ======================

  function startExam(){

    const name =
      document.getElementById("name").value;

    if(name.trim() === ""){

      alert("请输入姓名");

      return;
    }

    document.getElementById("login")
      .style.display = "none";

    document.getElementById("exam")
      .style.display = "block";
  }

  // ======================
  // 选择答案（已修复）
  // ======================

  function selectAnswer(type, value, btn){

    // 保存分数
    scores[type] = value;

    // 找到当前题目
    const questionBox =
      btn.parentElement;

    // 清除同题按钮高亮
    const buttons =
      questionBox.querySelectorAll("button");

    buttons.forEach(b => {
      b.classList.remove("selected");
    });

    // 当前按钮高亮
    btn.classList.add("selected");
  }

  // ======================
  // AI报告
  // ======================

  function generateLocalReport(){

    let total =
      scores.anxiety +
      scores.stress +
      scores.sleep +
      scores.emotion;

    let level = "";

    if(total <= 1){

      level = "心理状态良好";

    }else if(total <= 2){

      level = "存在轻度压力";

    }else{

      level = "近期压力较明显";
    }

    return `
【总体评估】

${level}

【维度分析】

焦虑指数：${scores.anxiety}

压力指数：${scores.stress}

睡眠指数：${scores.sleep}

情绪指数：${scores.emotion}

【建议】

1. 保持规律作息

2. 学会情绪释放

3. 保持适当运动

4. 与朋友家人沟通
`;
  }

  // ======================
  // 雷达图
  // ======================

  function drawChart(){

    const ctx =
      document.getElementById("radarChart");

    new Chart(ctx, {

      type: "radar",

      data: {

        labels: [
          "焦虑",
          "压力",
          "睡眠",
          "情绪"
        ],

        datasets: [{

          label: "心理指标",

          data: [
            scores.anxiety,
            scores.stress,
            scores.sleep,
            scores.emotion
          ]

        }]
      }
    });
  }

  // ======================
  // 提交
  // ======================

  function submitExam(){

    // 检查是否完成
    for(let key in scores){

      if(scores[key] === null){

        alert("请完成所有题目");

        return;
      }
    }

    document.getElementById("exam")
      .style.display = "none";

    document.getElementById("loading")
      .style.display = "block";

    // 模拟AI生成
    setTimeout(() => {

      const report =
        generateLocalReport();

      document.getElementById("loading")
        .style.display = "none";

      document.getElementById("result")
        .style.display = "block";

      drawChart();

      document.getElementById("report")
        .innerText = report;

    }, 1500);
  }

</script>

</body>
</html>
