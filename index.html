<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI心理测评系统</title>

  <!-- 图表 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
      linear-gradient(135deg,#eef4ff,#f8fbff);
      min-height:100vh;
      padding:40px 15px;
      color:#333;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:#fff;
      border-radius:24px;
      overflow:hidden;
      box-shadow:
      0 10px 40px rgba(0,0,0,0.08);
    }

    .top-banner{
      background:
      linear-gradient(135deg,#4a90e2,#6a8dff);
      color:#fff;
      padding:50px 30px;
      text-align:center;
    }

    .top-banner h1{
      font-size:38px;
      margin-bottom:15px;
    }

    .top-banner p{
      opacity:0.95;
      line-height:1.8;
    }

    .content{
      padding:35px;
    }

    .card{
      background:#fff;
      border:1px solid #eee;
      border-radius:18px;
      padding:24px;
      margin-bottom:22px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-2px);
      box-shadow:
      0 8px 20px rgba(0,0,0,0.05);
    }

    .question-title{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
      line-height:1.7;
    }

    .options{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .option-btn{
      border:none;
      padding:12px 22px;
      border-radius:12px;
      cursor:pointer;
      background:#edf3ff;
      color:#4a90e2;
      font-size:15px;
      transition:0.25s;
    }

    .option-btn:hover{
      background:#dbe9ff;
    }

    .selected{
      background:#4a90e2 !important;
      color:#fff !important;
      transform:scale(1.03);
    }

    input{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #ddd;
      font-size:16px;
      margin-top:18px;
    }

    .main-btn{
      background:
      linear-gradient(135deg,#4a90e2,#6a8dff);
      color:#fff;
      border:none;
      padding:15px 40px;
      border-radius:14px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .main-btn:hover{
      opacity:0.92;
      transform:translateY(-2px);
    }

    .center{
      text-align:center;
      margin-top:35px;
    }

    #exam,
    #loading,
    #result{
      display:none;
    }

    #loading{
      text-align:center;
      padding:50px;
      font-size:20px;
      color:#666;
    }

    .result-header{
      text-align:center;
      margin-bottom:30px;
    }

    .level-box{
      background:
      linear-gradient(135deg,#4a90e2,#6a8dff);
      color:#fff;
      padding:20px;
      border-radius:18px;
      margin-top:25px;
      text-align:center;
    }

    .report-box{
      background:#f8fbff;
      border-radius:18px;
      padding:25px;
      margin-top:30px;
      line-height:2;
      font-size:16px;
    }

    .score-grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(150px,1fr));
      gap:18px;
      margin-top:30px;
    }

    .score-item{
      background:#fff;
      border-radius:16px;
      padding:20px;
      text-align:center;
      box-shadow:
      0 5px 15px rgba(0,0,0,0.05);
    }

    .score-item h3{
      color:#666;
      margin-bottom:12px;
      font-size:15px;
    }

    .score-item p{
      font-size:30px;
      color:#4a90e2;
      font-weight:bold;
    }

    canvas{
      margin-top:35px;
    }

    @media(max-width:768px){

      .top-banner h1{
        font-size:30px;
      }

      .content{
        padding:20px;
      }

      .question-title{
        font-size:16px;
      }

      .option-btn{
        width:100%;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 顶部 -->
  <div class="top-banner">

    <h1>AI心理测评系统</h1>

    <p>
      基于情绪、压力、睡眠、焦虑等多个维度进行综合分析，
      自动生成个性化心理评估报告。
    </p>

  </div>

  <div class="content">

    <!-- 登录 -->
    <div id="login">

      <div class="card">

        <h2>开始心理测评</h2>

        <input
          type="text"
          id="name"
          placeholder="请输入姓名"
        >

        <div class="center">

          <button
            class="main-btn"
            onclick="startExam()">
            开始测评
          </button>

        </div>

      </div>

    </div>

    <!-- 测评 -->
    <div id="exam"></div>

    <!-- 加载 -->
    <div id="loading">
      AI正在分析你的心理状态，请稍候...
    </div>

    <!-- 结果 -->
    <div id="result">

      <div class="result-header">

        <h2>心理测评报告</h2>

      </div>

      <div class="level-box">

        <h2 id="levelText"></h2>

      </div>

      <div class="score-grid">

        <div class="score-item">
          <h3>焦虑指数</h3>
          <p id="anxietyScore">0</p>
        </div>

        <div class="score-item">
          <h3>压力指数</h3>
          <p id="stressScore">0</p>
        </div>

        <div class="score-item">
          <h3>睡眠指数</h3>
          <p id="sleepScore">0</p>
        </div>

        <div class="score-item">
          <h3>情绪指数</h3>
          <p id="emotionScore">0</p>
        </div>

      </div>

      <canvas id="radarChart"></canvas>

      <div class="report-box">

        <div id="report"></div>

      </div>

    </div>

  </div>

</div>

<script>

  // =====================
  // 题库（20题）
  // =====================

  const questions = [

    {
      text:"1. 你最近是否容易感到紧张？",
      type:"anxiety"
    },

    {
      text:"2. 你最近是否经常担心未来？",
      type:"anxiety"
    },

    {
      text:"3. 你是否容易因为小事焦虑？",
      type:"anxiety"
    },

    {
      text:"4. 你最近是否经常感到压力大？",
      type:"stress"
    },

    {
      text:"5. 你是否感觉学习或工作负担较重？",
      type:"stress"
    },

    {
      text:"6. 你是否经常觉得时间不够用？",
      type:"stress"
    },

    {
      text:"7. 你最近是否睡眠质量不好？",
      type:"sleep"
    },

    {
      text:"8. 你是否经常失眠或难以入睡？",
      type:"sleep"
    },

    {
      text:"9. 你是否经常半夜醒来？",
      type:"sleep"
    },

    {
      text:"10. 你最近是否情绪波动明显？",
      type:"emotion"
    },

    {
      text:"11. 你是否容易感到烦躁？",
      type:"emotion"
    },

    {
      text:"12. 你是否容易因为小事生气？",
      type:"emotion"
    },

    {
      text:"13. 你是否经常感到疲惫？",
      type:"stress"
    },

    {
      text:"14. 你是否觉得最近动力不足？",
      type:"emotion"
    },

    {
      text:"15. 你是否经常胡思乱想？",
      type:"anxiety"
    },

    {
      text:"16. 你最近是否容易情绪低落？",
      type:"emotion"
    },

    {
      text:"17. 你是否经常熬夜？",
      type:"sleep"
    },

    {
      text:"18. 你是否感觉休息后仍然疲劳？",
      type:"sleep"
    },

    {
      text:"19. 你是否容易对事情失去兴趣？",
      type:"emotion"
    },

    {
      text:"20. 你最近是否感觉精神压力持续存在？",
      type:"stress"
    }

  ];

  // =====================
  // 分数对象
  // =====================

  let scores = {
    anxiety:0,
    stress:0,
    sleep:0,
    emotion:0
  };

  let answered = {};

  // =====================
  // 开始测评
  // =====================

  function startExam(){

    const name =
      document.getElementById("name").value;

    if(name.trim() === ""){

      alert("请输入姓名");

      return;
    }

    document
      .getElementById("login")
      .style.display = "none";

    document
      .getElementById("exam")
      .style.display = "block";

    renderQuestions();
  }

  // =====================
  // 渲染题目
  // =====================

  function renderQuestions(){

    const exam =
      document.getElementById("exam");

    let html = "";

    questions.forEach((q,index)=>{

      html += `

      <div class="card">

        <div class="question-title">
          ${q.text}
        </div>

        <div class="options">

          <button
            class="option-btn"
            id="q${index}_0"
            onclick="selectAnswer(
              ${index},
              '${q.type}',
              0
            )">
            从不
          </button>

          <button
            class="option-btn"
            id="q${index}_1"
            onclick="selectAnswer(
              ${index},
              '${q.type}',
              1
            )">
            偶尔
          </button>

          <button
            class="option-btn"
            id="q${index}_2"
            onclick="selectAnswer(
              ${index},
              '${q.type}',
              2
            )">
            经常
          </button>

          <button
            class="option-btn"
            id="q${index}_3"
            onclick="selectAnswer(
              ${index},
              '${q.type}',
              3
            )">
            总是
          </button>

        </div>

      </div>

      `;
    });

    html += `

      <div class="center">

        <button
          class="main-btn"
          onclick="submitExam()">
          生成心理报告
        </button>

      </div>

    `;

    exam.innerHTML = html;
  }

  // =====================
  // 选择答案
  // =====================

  function selectAnswer(index,type,value){

    const prev =
      answered[index];

    if(prev){

      scores[type] -= prev;
    }

    answered[index] = value;

    scores[type] += value;

    // 清除选中状态
    for(let i=0;i<4;i++){

      document
      .getElementById(`q${index}_${i}`)
      .classList
      .remove("selected");
    }

    // 当前高亮
    document
      .getElementById(`q${index}_${value}`)
      .classList
      .add("selected");
  }

  // =====================
  // 提交测评
  // =====================

  function submitExam(){

    if(
      Object.keys(answered).length
      < questions.length
    ){

      alert("请完成全部题目");

      return;
    }

    document
      .getElementById("exam")
      .style.display = "none";

    document
      .getElementById("loading")
      .style.display = "block";

    setTimeout(()=>{

      generateReport();

    },1800);
  }

  // =====================
  // 生成报告
  // =====================

  function generateReport(){

    document
      .getElementById("loading")
      .style.display = "none";

    document
      .getElementById("result")
      .style.display = "block";

    // 数值展示
    document
      .getElementById("anxietyScore")
      .innerText = scores.anxiety;

    document
      .getElementById("stressScore")
      .innerText = scores.stress;

    document
      .getElementById("sleepScore")
      .innerText = scores.sleep;

    document
      .getElementById("emotionScore")
      .innerText = scores.emotion;

    // 总分
    const total =
      scores.anxiety +
      scores.stress +
      scores.sleep +
      scores.emotion;

    let level = "";
    let report = "";

    // 风险等级
    if(total <= 20){

      level = "心理状态良好";

      report = `
你的整体心理状态较稳定，
目前没有明显的心理压力风险。

你在情绪调节、
压力管理、
睡眠状态等方面表现较好。

建议继续保持规律生活，
维持良好的作息与运动习惯。
`;

    }else if(total <= 40){

      level = "存在轻度心理压力";

      report = `
你近期可能存在一定压力，
偶尔会出现情绪波动、
焦虑或疲惫感。

建议适当减少精神负担，
保持规律作息，
避免长期熬夜。

适度运动、
倾诉与休息，
能够有效缓解当前状态。
`;

    }else{

      level = "心理压力较明显";

      report = `
你的测评结果显示，
近期可能存在较明显的心理压力。

你可能出现：

• 情绪波动较大
• 睡眠质量下降
• 精神疲惫
• 焦虑感增强

建议：

1. 保持稳定作息
2. 减少长期精神压力
3. 适当运动
4. 与家人朋友沟通
5. 必要时寻求专业帮助
`;
    }

    document
      .getElementById("levelText")
      .innerText = level;

    document
      .getElementById("report")
      .innerText = report;

    drawChart();
  }

  // =====================
  // 雷达图
  // =====================

  function drawChart(){

    const ctx =
      document.getElementById(
        "radarChart"
      );

    new Chart(ctx,{

      type:"radar",

      data:{

        labels:[
          "焦虑",
          "压力",
          "睡眠",
          "情绪"
        ],

        datasets:[{

          label:"心理状态",

          data:[
            scores.anxiety,
            scores.stress,
            scores.sleep,
            scores.emotion
          ]

        }]
      },

      options:{
        responsive:true,
        scales:{
          r:{
            suggestedMin:0,
            suggestedMax:20
          }
        }
      }

    });
  }

</script>

</body>
</html>
