<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AI心理测评系统</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:
      "PingFang SC",
      "Microsoft YaHei",
      sans-serif;

      background:
      linear-gradient(
      135deg,
      #eef3ff,
      #f9fbff
      );

      min-height:100vh;

      padding:25px;
    }

    .container{

      max-width:920px;

      margin:auto;

      background:#fff;

      border-radius:28px;

      overflow:hidden;

      box-shadow:
      0 12px 40px rgba(0,0,0,0.08);
    }

    /* 顶部 */

    .header{

      background:
      linear-gradient(
      135deg,
      #4a90e2,
      #6d8dff
      );

      color:#fff;

      padding:55px 30px;

      text-align:center;
    }

    .header h1{

      font-size:38px;

      margin-bottom:16px;
    }

    .header p{

      opacity:0.92;

      line-height:1.9;

      font-size:15px;
    }

    /* 内容 */

    .content{

      padding:35px 25px 50px;
    }

    .card{

      background:#fff;

      border:1px solid #edf1f7;

      border-radius:22px;

      padding:25px;

      margin-bottom:22px;

      transition:0.2s;

      box-shadow:
      0 3px 10px rgba(0,0,0,0.03);
    }

    .card:hover{

      transform:translateY(-2px);

      box-shadow:
      0 8px 20px rgba(0,0,0,0.06);
    }

    .question{

      font-size:18px;

      line-height:1.8;

      font-weight:600;

      margin-bottom:18px;
    }

    .options{

      display:flex;

      flex-wrap:wrap;

      gap:12px;
    }

    /* 选项按钮 */

    .option-btn{

      border:none;

      padding:12px 22px;

      border-radius:14px;

      background:#edf4ff;

      color:#4a90e2;

      cursor:pointer;

      font-size:15px;

      transition:
      background 0.12s,
      transform 0.08s,
      color 0.12s;

      -webkit-tap-highlight-color:
      transparent;
    }

    .option-btn:hover{

      background:#dce8ff;
    }

    .option-btn:active{

      transform:scale(0.96);
    }

    .selected{

      background:
      linear-gradient(
      135deg,
      #4a90e2,
      #6f8fff
      ) !important;

      color:#fff !important;

      transform:scale(1.03);
    }

    /* 输入 */

    input{

      width:100%;

      padding:16px;

      border-radius:16px;

      border:1px solid #d9e3f1;

      margin-top:20px;

      font-size:16px;

      outline:none;
    }

    input:focus{

      border-color:#4a90e2;
    }

    /* 主按钮 */

    .main-btn{

      border:none;

      background:
      linear-gradient(
      135deg,
      #4a90e2,
      #6f8fff
      );

      color:#fff;

      padding:15px 40px;

      border-radius:16px;

      font-size:16px;

      cursor:pointer;

      transition:0.2s;
    }

    .main-btn:hover{

      opacity:0.92;
    }

    .main-btn:active{

      transform:scale(0.97);
    }

    .center{

      text-align:center;

      margin-top:35px;
    }

    /* 隐藏区域 */

    #exam,
    #loading,
    #result{

      display:none;
    }

    /* 加载 */

    #loading{

      text-align:center;

      padding:80px 20px;

      color:#666;

      font-size:20px;
    }

    /* 结果UI */

    .result-wrap{

      background:
      linear-gradient(
      135deg,
      #f7faff,
      #ffffff
      );

      border-radius:24px;

      padding:30px;
    }

    .result-top{

      text-align:center;

      margin-bottom:25px;
    }

    .result-top h2{

      font-size:34px;

      color:#333;

      margin-bottom:15px;
    }

    .tag{

      display:inline-block;

      padding:10px 22px;

      border-radius:999px;

      background:
      linear-gradient(
      135deg,
      #4a90e2,
      #6f8fff
      );

      color:#fff;

      font-size:15px;
    }

    /* 数据卡片 */

    .score-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(150px,1fr));

      gap:16px;

      margin-top:30px;
    }

    .score-card{

      background:#fff;

      border-radius:20px;

      padding:22px;

      text-align:center;

      box-shadow:
      0 6px 18px rgba(0,0,0,0.05);
    }

    .score-card h3{

      color:#777;

      font-size:15px;

      margin-bottom:12px;
    }

    .score-card p{

      font-size:32px;

      color:#4a90e2;

      font-weight:bold;
    }

    /* 图表 */

    .chart-box{

      width:100%;

      max-width:420px;

      margin:35px auto 10px;

      background:#fff;

      padding:20px;

      border-radius:24px;

      box-shadow:
      0 6px 18px rgba(0,0,0,0.05);
    }

    #radarChart{

      width:100% !important;

      height:320px !important;
    }

    /* AI报告 */

    .report-box{

      margin-top:28px;
    }

    .ai-report-card{

      background:
      linear-gradient(
      180deg,
      #ffffff,
      #f8fbff
      );

      border-radius:28px;

      overflow:hidden;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.05);
    }

    .report-head{

      display:flex;

      gap:20px;

      padding:28px;

      color:#fff;
    }

    .report-head h3{

      font-size:26px;

      margin-bottom:10px;
    }

    .report-head p{

      line-height:1.9;

      opacity:0.95;
    }

    .good{

      background:
      linear-gradient(
      135deg,
      #52c41a,
      #73d13d
      );
    }

    .mid{

      background:
      linear-gradient(
      135deg,
      #faad14,
      #ffc53d
      );
    }

    .high{

      background:
      linear-gradient(
      135deg,
      #ff7875,
      #ff4d4f
      );
    }

    .emoji{

      font-size:48px;

      min-width:60px;
    }

    .report-section{

      padding:28px 30px;

      border-bottom:
      1px solid #edf2f7;
    }

    .report-section:last-child{

      border-bottom:none;
    }

    .report-section h4{

      font-size:20px;

      margin-bottom:18px;

      color:#333;
    }

    .report-section p{

      line-height:2;

      color:#555;

      margin-bottom:12px;
    }

    .report-section ul{

      padding-left:20px;
    }

    .report-section li{

      line-height:2.2;

      color:#555;

      margin-bottom:8px;
    }

    @media(max-width:768px){

      .header h1{

        font-size:30px;
      }

      .question{

        font-size:16px;
      }

      .option-btn{

        width:100%;
      }

      .content{

        padding:22px 16px 40px;
      }

      .chart-box{

        max-width:100%;
      }

      #radarChart{

        height:260px !important;
      }

      .report-head{

        flex-direction:column;
      }

      .emoji{

        font-size:42px;
      }

      .report-head h3{

        font-size:22px;
      }
    }

  </style>

</head>

<body>

<div class="container">

  <!-- 顶部 -->

  <div class="header">

    <h1>AI心理测评系统</h1>

    <p>
      基于焦虑、压力、睡眠、情绪等多个维度，
      自动生成心理分析报告与可视化结果。
    </p>

  </div>

  <div class="content">

    <!-- 登录 -->

    <div id="login">

      <div class="card">

        <h2>开始心理测评</h2>

        <input
          type="text"
          id="name"
          placeholder="请输入姓名"
        >

        <div class="center">

          <button
            class="main-btn"
            onclick="startExam()">
            开始测评
          </button>

        </div>

      </div>

    </div>

    <!-- 题目 -->

    <div id="exam"></div>

    <!-- 加载 -->

    <div id="loading">
      AI正在生成你的心理分析报告...
    </div>

    <!-- 结果 -->

    <div id="result">

      <div class="result-wrap">

        <div class="result-top">

          <h2>心理测评报告</h2>

          <div
            class="tag"
            id="levelText">
          </div>

        </div>

        <!-- 分数 -->

        <div class="score-grid">

          <div class="score-card">

            <h3>焦虑指数</h3>

            <p id="anxietyScore">0</p>

          </div>

          <div class="score-card">

            <h3>压力指数</h3>

            <p id="stressScore">0</p>

          </div>

          <div class="score-card">

            <h3>睡眠指数</h3>

            <p id="sleepScore">0</p>

          </div>

          <div class="score-card">

            <h3>情绪指数</h3>

            <p id="emotionScore">0</p>

          </div>

        </div>

        <!-- 图表 -->

        <div class="chart-box">

          <canvas id="radarChart"></canvas>

        </div>

        <!-- AI报告 -->

        <div class="report-box">

          <div id="report"></div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

  // =========================
  // 题库
  // =========================

  const questions = [

    {
      text:"1. 你最近是否容易感到紧张？",
      type:"anxiety"
    },

    {
      text:"2. 你是否经常担心未来？",
      type:"anxiety"
    },

    {
      text:"3. 你是否容易因为小事焦虑？",
      type:"anxiety"
    },

    {
      text:"4. 你最近是否经常感到压力较大？",
      type:"stress"
    },

    {
      text:"5. 你是否觉得学习或工作负担较重？",
      type:"stress"
    },

    {
      text:"6. 你是否经常觉得时间不够用？",
      type:"stress"
    },

    {
      text:"7. 你最近是否睡眠质量不好？",
      type:"sleep"
    },

    {
      text:"8. 你是否经常难以入睡？",
      type:"sleep"
    },

    {
      text:"9. 你是否经常半夜醒来？",
      type:"sleep"
    },

    {
      text:"10. 你最近是否情绪波动明显？",
      type:"emotion"
    },

    {
      text:"11. 你是否容易烦躁？",
      type:"emotion"
    },

    {
      text:"12. 你是否容易因为小事生气？",
      type:"emotion"
    },

    {
      text:"13. 你是否经常感到疲惫？",
      type:"stress"
    },

    {
      text:"14. 你是否感觉动力不足？",
      type:"emotion"
    },

    {
      text:"15. 你是否经常胡思乱想？",
      type:"anxiety"
    },

    {
      text:"16. 你最近是否容易情绪低落？",
      type:"emotion"
    },

    {
      text:"17. 你是否经常熬夜？",
      type:"sleep"
    },

    {
      text:"18. 你是否感觉休息后仍然疲劳？",
      type:"sleep"
    },

    {
      text:"19. 你是否容易失去兴趣？",
      type:"emotion"
    },

    {
      text:"20. 你最近是否感觉精神压力持续存在？",
      type:"stress"
    }

  ];

  // =========================
  // 分数
  // =========================

  let scores = {

    anxiety:0,
    stress:0,
    sleep:0,
    emotion:0
  };

  let answered = {};

  // =========================
  // 开始
  // =========================

  function startExam(){

    const name =
      document.getElementById("name").value;

    if(name.trim() === ""){

      alert("请输入姓名");

      return;
    }

    document
      .getElementById("login")
      .style.display = "none";

    document
      .getElementById("exam")
      .style.display = "block";

    renderQuestions();
  }

  // =========================
  // 渲染题目
  // =========================

  function renderQuestions(){

    const exam =
      document.getElementById("exam");

    let html = "";

    questions.forEach((q,index)=>{

      html += `

      <div class="card">

        <div class="question">

          ${q.text}

        </div>

        <div class="options">

          <button
            class="option-btn"
            id="q${index}_0"
            onclick="selectAnswer(
            ${index},
            '${q.type}',
            0
            )">
            从不
          </button>

          <button
            class="option-btn"
            id="q${index}_1"
            onclick="selectAnswer(
            ${index},
            '${q.type}',
            1
            )">
            偶尔
          </button>

          <button
            class="option-btn"
            id="q${index}_2"
            onclick="selectAnswer(
            ${index},
            '${q.type}',
            2
            )">
            经常
          </button>

          <button
            class="option-btn"
            id="q${index}_3"
            onclick="selectAnswer(
            ${index},
            '${q.type}',
            3
            )">
            总是
          </button>

        </div>

      </div>

      `;
    });

    html += `

    <div class="center">

      <button
        class="main-btn"
        onclick="submitExam()">
        生成心理报告
      </button>

    </div>

    `;

    exam.innerHTML = html;
  }

  // =========================
  // 选择答案
  // =========================

  function selectAnswer(
    index,
    type,
    value
  ){

    const prev =
      answered[index];

    if(prev !== undefined){

      scores[type] -= prev;
    }

    answered[index] = value;

    scores[type] += value;

    for(let i=0;i<4;i++){

      document
      .getElementById(`q${index}_${i}`)
      .classList
      .remove("selected");
    }

    document
      .getElementById(
      `q${index}_${value}`
      )
      .classList
      .add("selected");
  }

  // =========================
  // 提交
  // =========================

  function submitExam(){

    if(
      Object.keys(answered).length
      < questions.length
    ){

      alert("请完成所有题目");

      return;
    }

    document
      .getElementById("exam")
      .style.display = "none";

    document
      .getElementById("loading")
      .style.display = "block";

    setTimeout(()=>{

      generateReport();

    },1200);
  }

  // =========================
  // AI分析
  // =========================

  function generateReport(){

    document
      .getElementById("loading")
      .style.display = "none";

    document
      .getElementById("result")
      .style.display = "block";

    document
      .getElementById("anxietyScore")
      .innerText = scores.anxiety;

    document
      .getElementById("stressScore")
      .innerText = scores.stress;

    document
      .getElementById("sleepScore")
      .innerText = scores.sleep;

    document
      .getElementById("emotionScore")
      .innerText = scores.emotion;

    const total =
      scores.anxiety +
      scores.stress +
      scores.sleep +
      scores.emotion;

    let level = "";
    let reportHtml = "";

    // 良好

    if(total <= 20){

      level = "心理状态良好";

      reportHtml = `

      <div class="ai-report-card">

        <div class="report-head good">

          <div class="emoji">
            🌿
          </div>

          <div>

            <h3>
              整体状态稳定
            </h3>

            <p>
              你当前的心理状态整体较平稳，
              情绪控制能力较好。
            </p>

          </div>

        </div>

        <div class="report-section">

          <h4>AI观察</h4>

          <p>
            你具备一定的情绪调节能力，
            面对压力时能够较理性地处理问题。
          </p>

        </div>

        <div class="report-section">

          <h4>生活建议</h4>

          <ul>

            <li>
              ☀️ 保持规律睡眠与饮食。
            </li>

            <li>
              🚶 每周适度运动，
              能长期稳定情绪。
            </li>

            <li>
              ☕ 不要长期让自己处于高效率状态。
            </li>

            <li>
              👥 多与现实中的朋友交流。
            </li>

          </ul>

        </div>

      </div>

      `;
    }

    // 中等压力

    else if(total <= 40){

      level = "存在轻度心理压力";

      reportHtml = `

      <div class="ai-report-card">

        <div class="report-head mid">

          <div class="emoji">
            🌤️
          </div>

          <div>

            <h3>
              近期压力有所增加
            </h3>

            <p>
              你最近可能存在一定程度的压力、
              情绪波动或精神疲惫感。
            </p>

          </div>

        </div>

        <div class="report-section">

          <h4>AI观察</h4>

          <p>
            你可能已经习惯了长期紧绷的状态，
            即使休息时，
            大脑也依然处于持续思考状态。
          </p>

        </div>

        <div class="report-section">

          <h4>现实建议</h4>

          <ul>

            <li>
              📱 睡前减少刷手机时间。
            </li>

            <li>
              🎧 多晒太阳、
              听音乐、
              散步。
            </li>

            <li>
              🍜 不要长期忽略吃饭与休息。
            </li>

            <li>
              🧑‍🤝‍🧑 找可信任的人倾诉。
            </li>

            <li>
              ✍️ 尝试记录情绪日记。
            </li>

          </ul>

        </div>

      </div>

      `;
    }

    // 高压力

    else{

      level = "心理压力较明显";

      reportHtml = `

      <div class="ai-report-card">

        <div class="report-head high">

          <div class="emoji">
            🌧️
          </div>

          <div>

            <h3>
              你最近可能真的很累了
            </h3>

            <p>
              当前测评结果显示，
              你的心理压力已经比较明显。
            </p>

          </div>

        </div>

        <div class="report-section">

          <h4>AI观察</h4>

          <p>
            你可能正在经历：
          </p>

          <ul>

            <li>长期焦虑</li>

            <li>情绪压抑</li>

            <li>睡眠下降</li>

            <li>精神疲劳</li>

          </ul>

          <p>
            有时候，
            不是你不够努力，
            而是大脑已经很久没有真正休息了。
          </p>

        </div>

        <div class="report-section">

          <h4>现实中的建议</h4>

          <ul>

            <li>
              🌙 先慢慢恢复睡眠。
            </li>

            <li>
              🚶 多出门走走，
              不要长期封闭自己。
            </li>

            <li>
              🍱 保持规律饮食。
            </li>

            <li>
              📞 不要一直一个人硬撑。
            </li>

            <li>
              ❤️ 必要时可以寻求专业支持。
            </li>

          </ul>

        </div>

      </div>

      `;
    }

    document
      .getElementById("levelText")
      .innerText = level;

    document
      .getElementById("report")
      .innerHTML = reportHtml;

    drawChart();
  }

  // =========================
  // 雷达图
  // =========================

  function drawChart(){

    const ctx =
      document.getElementById(
      "radarChart"
      );

    new Chart(ctx,{

      type:"radar",

      data:{

        labels:[
          "焦虑",
          "压力",
          "睡眠",
          "情绪"
        ],

        datasets:[{

          label:"心理状态",

          data:[
            scores.anxiety,
            scores.stress,
            scores.sleep,
            scores.emotion
          ],

          fill:true
        }]
      },

      options:{

        responsive:true,

        maintainAspectRatio:false,

        plugins:{

          legend:{
            display:false
          }
        },

        scales:{

          r:{

            suggestedMin:0,

            suggestedMax:20,

            ticks:{
              display:false
            },

            pointLabels:{
              font:{
                size:14
              }
            }
          }
        }
      }
    });
  }

</script>

</body>
</html>
