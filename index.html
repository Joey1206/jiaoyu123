<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI心理测评系统</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    h1,
    h2,
    h3 {
      text-align: center;
    }

    .question {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
      font-size: 15px;
      margin-right: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .selected {
      background: #28a745 !important;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    #exam,
    #loading,
    #result {
      display: none;
    }

    #loading {
      text-align: center;
      margin-top: 30px;
      font-size: 18px;
      color: #666;
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.8;
      background: #fafafa;
      padding: 15px;
      border-radius: 8px;
    }

    .submit-box {
      text-align: center;
      margin-top: 30px;
    }

    .success {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>AI心理测评系统</h1>

    <!-- 登录 -->
    <div id="login">

      <label>请输入姓名：</label>

      <input type="text" id="name" placeholder="请输入姓名">

      <div style="text-align:center;margin-top:20px;">
        <button onclick="startExam()">开始测评</button>
      </div>

    </div>

    <!-- 考试 -->
    <div id="exam">

      <h2>请根据真实情况作答</h2>

      <!-- 题目1 -->
      <div class="question">

        <p>1. 你最近是否容易焦虑？</p>

        <div class="buttons">

          <button id="anxiety_yes"
            onclick="answer('anxiety',1,'anxiety_yes','anxiety_no')">
            是
          </button>

          <button id="anxiety_no"
            onclick="answer('anxiety',0,'anxiety_no','anxiety_yes')">
            否
          </button>

        </div>

      </div>

      <!-- 题目2 -->
      <div class="question">

        <p>2. 你最近是否感觉压力较大？</p>

        <div class="buttons">

          <button id="stress_yes"
            onclick="answer('stress',1,'stress_yes','stress_no')">
            是
          </button>

          <button id="stress_no"
            onclick="answer('stress',0,'stress_no','stress_yes')">
            否
          </button>

        </div>

      </div>

      <!-- 题目3 -->
      <div class="question">

        <p>3. 你最近是否睡眠质量不好？</p>

        <div class="buttons">

          <button id="sleep_yes"
            onclick="answer('sleep',1,'sleep_yes','sleep_no')">
            是
          </button>

          <button id="sleep_no"
            onclick="answer('sleep',0,'sleep_no','sleep_yes')">
            否
          </button>

        </div>

      </div>

      <!-- 题目4 -->
      <div class="question">

        <p>4. 你最近是否情绪波动明显？</p>

        <div class="buttons">

          <button id="emotion_yes"
            onclick="answer('emotion',1,'emotion_yes','emotion_no')">
            是
          </button>

          <button id="emotion_no"
            onclick="answer('emotion',0,'emotion_no','emotion_yes')">
            否
          </button>

        </div>

      </div>

      <div class="submit-box">
        <button onclick="submitExam()">提交测评</button>
      </div>

    </div>

    <!-- 加载 -->
    <div id="loading">
      AI正在生成心理报告，请稍候...
    </div>

    <!-- 结果 -->
    <div id="result">

      <h2 class="success">测评完成</h2>

      <canvas id="radarChart"></canvas>

      <h3>AI心理分析报告</h3>

      <pre id="report"></pre>

    </div>

  </div>

  <script>

    // ====================================
    // 1. 配置区域（必须替换）
    // ====================================

    const supabaseUrl = "你的SupabaseURL";
    const supabaseKey = "你的SupabaseKey";

    // OpenAI API Key
    // 如果你暂时没有，可以先留空
    const openaiKey = "";

    // ====================================
    // 2. 初始化Supabase
    // ====================================

    const supabaseClient = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    // ====================================
    // 3. 分数记录
    // ====================================

    let scores = {
      anxiety: null,
      stress: null,
      sleep: null,
      emotion: null
    };

    // ====================================
    // 4. 开始考试
    // ====================================

    function startExam() {

      const name = document.getElementById("name").value;

      if (name.trim() === "") {

        alert("请输入姓名");

        return;
      }

      document.getElementById("login").style.display = "none";

      document.getElementById("exam").style.display = "block";
    }

    // ====================================
    // 5. 选择答案（已修复点击无反馈）
    // ====================================

    function answer(type, value, currentBtn, otherBtn) {

      // 保存答案
      scores[type] = value;

      // 当前按钮高亮
      document.getElementById(currentBtn)
        .classList.add("selected");

      // 取消另一个按钮高亮
      document.getElementById(otherBtn)
        .classList.remove("selected");
    }

    // ====================================
    // 6. AI生成报告
    // ====================================

    async function generateReport(name) {

      // 如果没配置OpenAI
      // 自动使用本地报告（不会报错）

      if (!openaiKey || openaiKey.trim() === "") {

        return `
【心理测评结果】

姓名：${name}

焦虑指数：${scores.anxiety}
压力指数：${scores.stress}
睡眠指数：${scores.sleep}
情绪指数：${scores.emotion}

【总体分析】

你当前存在一定的心理压力，
建议保持规律作息，
适当运动，
并学会情绪调节。

【建议】

1. 保持良好睡眠
2. 每天适当运动
3. 与朋友家人交流
4. 学会释放压力
`;
      }

      // 如果配置了OpenAI
      // 才调用AI

      const prompt = `
你是一名专业心理咨询师。

请根据以下数据生成一份详细心理报告：

姓名：${name}

焦虑指数：${scores.anxiety}
压力指数：${scores.stress}
睡眠指数：${scores.sleep}
情绪指数：${scores.emotion}

要求：

1. 总体评估
2. 分维度分析
3. 给出改善建议
4. 语气专业、温和
`;

      const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + openaiKey
          },

          body: JSON.stringify({
            model: "gpt-4o-mini",

            messages: [
              {
                role: "user",
                content: prompt
              }
            ]
          })
        }
      );

      const data = await response.json();

      return data.choices[0].message.content;
    }

    // ====================================
    // 7. 雷达图
    // ====================================

    function drawChart() {

      const ctx = document
        .getElementById("radarChart");

      new Chart(ctx, {

        type: "radar",

        data: {

          labels: [
            "焦虑",
            "压力",
            "睡眠",
            "情绪"
          ],

          datasets: [{

            label: "心理指标",

            data: [
              scores.anxiety,
              scores.stress,
              scores.sleep,
              scores.emotion
            ]

          }]
        }
      });
    }

    // ====================================
    // 8. 提交测评
    // ====================================

    async function submitExam() {

      // 检查是否完成答题

      for (let key in scores) {

        if (scores[key] === null) {

          alert("请完成所有题目");

          return;
        }
      }

      document.getElementById("exam")
        .style.display = "none";

      document.getElementById("loading")
        .style.display = "block";

      const name = document
        .getElementById("name")
        .value;

      try {

        // 生成报告
        const report = await generateReport(name);

        // 保存数据库
        // 如果Supabase没配置好
        // 不影响页面展示

        try {

          if (
            supabaseUrl !== "你的SupabaseURL"
            &&
            supabaseKey !== "你的SupabaseKey"
          ) {

            await supabaseClient
              .from("results")
              .insert([{

                name: name,

                anxiety: scores.anxiety,

                stress: scores.stress,

                sleep: scores.sleep,

                emotion: scores.emotion,

                report: report
              }]);
          }

        } catch (dbError) {

          console.log("数据库保存失败：", dbError);
        }

        // 展示结果

        document.getElementById("loading")
          .style.display = "none";

        document.getElementById("result")
          .style.display = "block";

        // 绘制图表
        drawChart();

        // 显示报告
        document.getElementById("report")
          .innerText = report;

      } catch (error) {

        console.log(error);

        alert("生成报告失败");
      }
    }

  </script>

</body>

</html>
